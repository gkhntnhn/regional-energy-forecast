services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: forecast_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
      POSTGRES_DB: energy_forecast
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forecast_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.21.3
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql+psycopg2://forecast_user:${DB_PASSWORD:-devpassword}@db:5432/mlflow
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlartifacts
    volumes:
      - mlartifacts:/mlartifacts
    command: >
      bash -c "pip install --quiet psycopg2-binary &&
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql+psycopg2://forecast_user:${DB_PASSWORD:-devpassword}@db:5432/mlflow
      --default-artifact-root /mlartifacts"

volumes:
  pgdata:
  mlartifacts:
