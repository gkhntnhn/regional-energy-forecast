name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-extras
      - run: uv run mypy src/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-extras
      - run: >-
          uv run pytest tests/unit/ tests/integration/
          -q --timeout=120 -m "not slow"
          --cov=energy_forecast --cov-report=term-missing --cov-fail-under=75
