# Calendar feature configuration
datetime:
  extract:
    - hour
    - day_of_week
    - day_of_month
    - day_of_year
    - week_of_year
    - month
    - quarter
    - year

cyclical:
  hour:
    period: 24
  day_of_week:
    period: 7
  month:
    period: 12
  day_of_year:
    period: 365

holidays:
  path: "data/static/turkish_holidays.parquet"
  include_ramadan: true
  bridge_days: true

anticipation:
  # Forward-looking holiday windows: "is there a holiday in the next N days?"
  # NOT leakage — calendar is deterministic (known future)
  enabled: true
  windows: [3, 7, 15]

spline_seasonality:
  # Periodic spline encoding for hour (more flexible than sin/cos)
  enabled: true
  n_splines: 12

business_hours:
  start: 8
  end: 18
  peak_start: 17
  peak_end: 22
