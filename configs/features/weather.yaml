# Weather feature configuration
# NOTE: Weather forecast is NOT leakage — available from OpenMeteo at prediction time
thresholds:
  hdd_base: 18.0    # Heating Degree Days base temperature
  cdd_base: 24.0    # Cooling Degree Days base temperature
  extreme_cold: 0.0
  extreme_hot: 35.0
  high_wind: 25.0   # km/h (data max ~31, old 50 was always 0)
  # R2: Selective extreme flags (zero-importance flags disabled)
  extreme_flags:
    cold: true       # Keep — winter Bursa'da anlamli
    hot: false       # R2 DISABLED: zero CatBoost importance
    wind: false      # R2 DISABLED: zero CatBoost importance
    precip: false    # R2 DISABLED: zero CatBoost importance

comfort_index:
  method: "apparent_temperature"

rolling:
  windows:
    - 6
    - 12
    - 24
  functions:
    - mean
    - min
    - max

weather_lags:
  # Thermal inertia: yesterday's temperature still affects today's consumption
  # R1 pruning: 8→4 hours, 3→2 columns (wind_speed lags near-zero importance)
  # R2 pruning: humidity 48h lag dropped (autocorrelated, near-zero importance)
  enabled: true
  hours: [6, 12, 24]          # DROPPED R2: 48h (autocorrelated humidity)
  columns:
    - temperature_2m           # keep — strong thermal inertia
    - relative_humidity_2m     # keep — comfort signal

quadratic_temperature:
  # Energy-temperature is U-shaped: both cold and hot extremes increase demand
  enabled: true

severity:
  # R2: DISABLED — wth_severity and wth_is_severe both zero/near-zero importance
  enabled: false
  wind_threshold: 25.0
  precip_threshold: 5.0

interactions:
  # R2: cdd_x_is_peak disabled (zero importance), others kept
  cdd_x_is_peak: false

heat_index:
  # Steadman simplified heat index — captures humidity-amplified heat stress
  enabled: true
  threshold: 27.0

temp_deviation:
  # Temperature deviation from expanding mean — "unusually hot/cold" anomaly signal
  enabled: true
