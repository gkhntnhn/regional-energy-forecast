# EPIAS feature configuration
# CRITICAL: min_lag=48, raw values are DROPPED after feature creation
source:
  cache_dir: "data/external/epias"
  file_pattern: "epias_market_{year}.parquet"

variables:
  - FDPP
  - Real_Time_Consumption
  - DAM_Purchase
  - Bilateral_Agreement_Purchase
  - Load_Forecast

lags:
  min_lag: 48
  values:
    - 48
    - 72
    - 168

rolling:
  # shift(1) THEN rolling()
  windows:
    - 24
    - 48
    - 168
  functions:
    - mean
    - std

expanding:
  min_periods: 48
  functions:
    - mean

drop_raw: true

# Real-time generation data (supply-side features)
# CRITICAL: min_lag=48, raw gen_ values are DROPPED after feature creation
generation:
  variables:
    - gen_asphaltite_coal
    - gen_biomass
    - gen_black_coal
    - gen_dammed_hydro
    - gen_fueloil
    - gen_geothermal
    - gen_import_coal
    - gen_import_export
    - gen_lignite
    - gen_lng
    - gen_naphta
    - gen_natural_gas
    - gen_river
    - gen_sun
    - gen_total
    - gen_wasteheat
    - gen_wind
  lags:
    min_lag: 48
    values:
      - 48
      - 168
  rolling:
    windows:
      - 24
      - 168
    functions:
      - mean
  expanding:
    min_periods: 48
    functions:
      - mean
  drop_raw: true
  composites:
    # Supply-side mix ratios from lagged generation data
    enabled: true
    renewable_vars:
      - gen_wind
      - gen_sun
      - gen_river
      - gen_dammed_hydro
    thermal_vars:
      - gen_natural_gas
      - gen_lignite
      - gen_import_coal
    total_var: gen_total
    lag: 48
