# EPIAS feature configuration
# CRITICAL: min_lag=48, raw values are DROPPED after feature creation
source:
  cache_dir: "data/external/epias"
  file_pattern: "epias_market_{year}.parquet"

variables:
  # R2 prune: 5→4 (Bilateral near-zero importance)
  - FDPP                          # KGÜP toplam — planlanan üretim (region=TR1 gerektirir)
  - Real_Time_Consumption
  - DAM_Purchase
  - Load_Forecast
  # DROPPED: Bilateral_Agreement_Purchase (near-zero R1 importance)

lags:
  min_lag: 48
  values:
    - 48
    - 168           # DROPPED: 72 (3-day lag weak, R1 near-zero importance)

rolling:
  # shift(1) THEN rolling()
  windows:
    - 24
    - 168           # DROPPED: 48 (redundant between 24 and 168)
  functions:
    - mean          # DROPPED: std (near-zero importance in R1)

expanding:
  min_periods: 48
  functions:
    - mean

drop_raw: true

# Real-time generation data (supply-side features)
# CRITICAL: min_lag=48, raw gen_ values are DROPPED after feature creation
generation:
  # R2 prune: 5→2 variables (individual fuels near-zero, aggregate + dominant thermal yeter)
  # Composite ratios: renewable_ratio = 1 - (natural_gas / total)
  variables:
    - gen_total           # aggregate — most informative
    - gen_natural_gas     # dominant thermal source (~40% of generation)
    # DROPPED R2: gen_wind, gen_sun, gen_dammed_hydro (each <0.05% importance)
    # DROPPED R1: 12 minor fuel types
  lags:
    min_lag: 48
    values:
      - 48              # DROPPED: 168 (weekly gen lag weak)
  rolling:
    windows:
      - 24              # DROPPED: 168
    functions:
      - mean
  expanding:
    min_periods: 48
    functions:
      - mean
  drop_raw: true
  composites:
    # Supply-side mix ratios from lagged generation data
    # R2: renewable_ratio = 1 - thermal_ratio (gen_total ve gen_natural_gas'tan turetilir)
    enabled: true
    renewable_vars: []    # R2: bos — renewable_ratio = 1 - thermal_ratio olarak hesaplanir
    thermal_vars:
      - gen_natural_gas
    total_var: gen_total
    lag: 48
