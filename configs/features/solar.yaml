# Solar feature configuration
# NOTE: Solar features are NOT leakage — deterministic astronomical calculation
location:
  latitude: 40.183   # Bursa (primary)
  longitude: 29.050
  altitude: 100
  timezone: "Europe/Istanbul"

panel:
  tilt: 35
  azimuth: 180  # south-facing

features:
  - sol_elevation
  - sol_azimuth
  - sol_ghi
  - sol_dni
  - sol_dhi
  - sol_poa_global
  - sol_clearness_index
  - sol_cloud_proxy
  - sol_is_daylight
  - sol_daylight_hours

lead:
  # Solar lead/lag features (NOT leakage — deterministic astronomical calculation)
  # Range [-10, +10]: negative = lead (future), positive = lag (past)
  enabled: true
  hours:
    - 1
    - 2
    - 3
  lag_range:
    min: -10
    max: 10
  lag_columns:
    - sol_ghi
    - sol_dni
    - sol_dhi
