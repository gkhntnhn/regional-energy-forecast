# Optuna hyperparameter search space
catboost:
  n_trials: 50
  search_space:
    iterations:
      type: int
      low: 1000
      high: 3000
    learning_rate:
      type: float
      low: 0.01
      high: 0.1
      log: true
    depth:
      type: int
      low: 4
      high: 7
    l2_leaf_reg:
      type: float
      low: 1.0
      high: 10.0
    min_child_samples:
      type: int
      low: 5
      high: 100
    subsample:
      type: float
      low: 0.6
      high: 1.0

cross_validation:
  n_splits: 12
  val_period_days: 30
  test_period_days: 30
  shuffle: false
