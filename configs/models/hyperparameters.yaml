# Optuna hyperparameter search spaces
# Each param: type (int/float/categorical), low, high, step?, log?, choices?
# Adding a new parameter to YAML requires NO code change

target_col: consumption

catboost:
  n_trials: 50
  search_space:
    iterations:
      type: int
      low: 1000
      high: 3000
    learning_rate:
      type: float
      low: 0.01
      high: 0.1
      log: true
    depth:
      type: int
      low: 4
      high: 7
    l2_leaf_reg:
      type: float
      low: 1.0
      high: 10.0
    min_child_samples:
      type: int
      low: 5
      high: 100
    subsample:
      type: float
      low: 0.6
      high: 1.0
    loss_function:
      type: categorical
      choices: ["RMSE", "MAE"]

prophet:
  n_trials: 30
  search_space:
    changepoint_prior_scale:
      type: float
      low: 0.001
      high: 0.5
      log: true
    seasonality_prior_scale:
      type: float
      low: 0.01
      high: 50.0
      log: true
    holidays_prior_scale:
      type: float
      low: 0.01
      high: 50.0
      log: true
    seasonality_mode:
      type: categorical
      choices: ["additive", "multiplicative"]

tft:
  n_trials: 20
  search_space: {}

cross_validation:
  n_splits: 12
  val_months: 1
  test_months: 1
  gap_hours: 0
  shuffle: false
