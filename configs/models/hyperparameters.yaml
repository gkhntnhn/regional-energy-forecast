# Optuna hyperparameter search spaces
# Each param: type (int/float/categorical), low, high, step?, log?, choices?
# Adding a new parameter to YAML requires NO code change

target_col: consumption

catboost:
  n_trials: 1
  search_space:
    iterations:
      type: int
      low: 100
      high: 100
    learning_rate:
      type: float
      low: 0.01
      high: 0.1
      log: true
    depth:
      type: int
      low: 4
      high: 7
    l2_leaf_reg:
      type: float
      low: 1.0
      high: 10.0
    min_child_samples:
      type: int
      low: 5
      high: 100
    subsample:
      type: float
      low: 0.6
      high: 1.0
    loss_function:
      type: categorical
      choices: ["MAE"]

prophet:
  n_trials: 1
  search_space:
    changepoint_prior_scale:
      type: float
      low: 0.001
      high: 1.0              # expanded from 0.5 — allow more aggressive trend shifts
      log: true
    seasonality_prior_scale:
      type: float
      low: 0.01
      high: 50.0
      log: true
    holidays_prior_scale:
      type: float
      low: 0.01
      high: 50.0
      log: true
    n_changepoints:
      type: int
      low: 15
      high: 50
    # seasonality_mode removed from search space — energy consumption is
    # inherently multiplicative (seasonal effects scale with load level).
    # Fixed in configs/models/prophet.yaml → seasonality.mode: "multiplicative"

tft:
  n_trials: 1
  search_space:
    hidden_size:
      type: int
      low: 8
      high: 8
      step: 8
    attention_head_size:
      type: categorical
      choices: [1]
    dropout:
      type: float
      low: 0.1
      high: 0.1
    hidden_continuous_size:
      type: int
      low: 8
      high: 8
      step: 8
    lstm_layers:
      type: categorical
      choices: [1]
    learning_rate:
      type: float
      low: 0.001
      high: 0.001
      log: true
    batch_size:
      type: categorical
      choices: [128]

cross_validation:
  n_splits: 2
  val_months: 1
  test_months: 1
  gap_hours: 0
  shuffle: false
