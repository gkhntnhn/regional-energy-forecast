# Optuna hyperparameter search spaces — R2 (R1-informed narrowed ranges)
# Each param: type (int/float/categorical), low, high, step?, log?, choices?
# Adding a new parameter to YAML requires NO code change

target_col: consumption

catboost:
  n_trials: 1            # LOCAL SMOKE TEST (prod: 30)
  search_space:
    iterations:
      type: int
      low: 100
      high: 100            # LOCAL SMOKE TEST (prod: 5000, early stopping decides)
    learning_rate:
      type: float
      low: 0.05
      high: 0.12          # Narrowed from [0.01, 0.1] — R1 optimum: 0.093
      log: true
    depth:
      type: int
      low: 5
      high: 7             # Keep some exploration (R1: depth=6 dominated)
    l2_leaf_reg:
      type: float
      low: 1.0
      high: 3.0           # Narrowed from [1.0, 10.0] — R1 optimum: 1.57
    min_child_samples:
      type: int
      low: 50
      high: 100           # Narrowed from [5, 100] — R1 optimum: 75
    subsample:
      type: float
      low: 0.65
      high: 0.95          # Narrowed from [0.6, 1.0] — R1 optimum: 0.75
    loss_function:
      type: categorical
      choices: ["RMSE"]   # Fixed — RMSE beat MAE by 0.16% (2.42% vs 2.58%)

prophet:
  n_trials: 1            # SMOKE TEST (prod: 30)
  search_space:
    changepoint_prior_scale:
      type: float
      low: 0.001
      high: 0.02          # Narrowed from [0.001, 1.0] — R1 best: 0.003
      log: true
    seasonality_prior_scale:
      type: float
      low: 0.01
      high: 1.0           # Narrowed from [0.01, 50.0] — R1 best: 0.038
      log: true
    holidays_prior_scale:
      type: float
      low: 0.005
      high: 0.5           # Narrowed from [0.01, 50.0] — R1 best: 0.016
      log: true
    n_changepoints:
      type: int
      low: 35
      high: 50            # Narrowed from [15, 50] — R1 best: 46
    # seasonality_mode removed from search space — energy consumption is
    # inherently multiplicative (seasonal effects scale with load level).
    # Fixed in configs/models/prophet.yaml → seasonality.mode: "multiplicative"

tft:
  n_trials: 1              # SMOKE TEST (prod: 15)
  search_space:
    # hidden_size: fixed at 128 in tft.yaml (H200 validated)
    # windows_batch_size: fixed at 2048 in tft.yaml (H200 sweet spot)
    n_head:
      type: categorical
      choices: [1, 2, 4]  # Explore multi-head attention (NF: n_head)
    dropout:
      type: float
      low: 0.05
      high: 0.2           # Wider range around default 0.1
    n_rnn_layers:
      type: categorical
      choices: [1, 2]     # Explore deeper RNN (NF: n_rnn_layers)
    learning_rate:
      type: float
      low: 0.0005
      high: 0.005         # Range around default 0.001
      log: true

cross_validation:
  n_splits: 3             # LOCAL SMOKE TEST (prod: 12-fold TSCV)
  val_months: 1
  test_months: 1
  gap_hours: 0
  shuffle: false
