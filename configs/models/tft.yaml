# Temporal Fusion Transformer configuration
architecture:
  hidden_size: 64
  attention_head_size: 4
  lstm_layers: 2
  dropout: 0.1
  hidden_continuous_size: 16

training:
  encoder_length: 168  # 7 days
  prediction_length: 48
  batch_size: 64
  max_epochs: 100
  learning_rate: 0.001
  early_stop_patience: 10
  gradient_clip_val: 0.1
  random_seed: 42
  accelerator: "auto"  # "auto" uses GPU if available, else CPU
  num_workers: 0

optimization:
  fast_epochs: 10  # Reduced epochs for Optuna trials
  val_size_hours: 720  # ~1 month (24 * 30) for final model validation

# Features that are known in the future (deterministic or forecast available)
covariates:
  time_varying_known:
    - hour_sin
    - hour_cos
    - day_of_week_sin
    - day_of_week_cos
    - month_sin
    - month_cos
    - is_holiday
    - is_weekend
    - is_ramadan
    - sol_elevation
    - sol_azimuth
    - temperature_2m
    - relative_humidity_2m
    - apparent_temperature

quantiles:
  - 0.02
  - 0.10
  - 0.25
  - 0.50
  - 0.75
  - 0.90
  - 0.98

loss: "quantile"
