# Prophet model configuration
seasonality:
  mode: "multiplicative"
  daily:
    fourier_order: 15
  weekly:
    fourier_order: 8
  yearly:
    fourier_order: 12

holidays:
  country: "TR"
  include_ramadan: true

# R2: 14 regressors (2 swapped: -wind_speed_10m -is_peak, +apparent_temperature +is_sunday)
regressors:
  # --- Consumption lags (autoregressive signal) ---
  - name: "consumption_lag_168"
    mode: "multiplicative"
  - name: "consumption_lag_48"
    mode: "multiplicative"
  - name: "consumption_lag_720"
    mode: "multiplicative"
  # --- Weather ---
  - name: "temperature_2m"
    mode: "multiplicative"
  - name: "apparent_temperature"    # R2 NEW: 3.06% CatBoost importance, better thermal proxy
    mode: "multiplicative"
  - name: "relative_humidity_2m"
    mode: "additive"
  # DROPPED R2: wind_speed_10m (low importance, daily Fourier captures wind pattern)
  - name: "shortwave_radiation"
    mode: "multiplicative"
  - name: "wth_cdd"
    mode: "multiplicative"
  - name: "wth_hdd"
    mode: "multiplicative"
  # --- Deterministic (calendar/solar) ---
  - name: "is_weekend"
    mode: "multiplicative"
  - name: "is_sunday"               # R2 NEW: weekend MAPE 5.31%, Pazar farkli tuketim paterni
    mode: "multiplicative"
  - name: "is_holiday"
    mode: "multiplicative"
  - name: "is_business_hours"
    mode: "multiplicative"
  # DROPPED R2: is_peak (zero CatBoost importance, overlap with daily Fourier + is_business_hours)
  - name: "sol_elevation"
    mode: "multiplicative"

changepoint:
  prior_scale: 0.05
  n_changepoints: 25

uncertainty:
  interval_width: 0.95
  mcmc_samples: 0

optimization:
  random_seed: 42  # Optuna TPESampler seed
