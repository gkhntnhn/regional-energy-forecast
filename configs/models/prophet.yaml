# Prophet model configuration
seasonality:
  mode: "multiplicative"
  daily:
    fourier_order: 15
  weekly:
    fourier_order: 8
  yearly:
    fourier_order: 12

holidays:
  country: "TR"
  include_ramadan: true

regressors:
  # --- Consumption lags (autoregressive signal) ---
  - name: "consumption_lag_168"
    mode: "multiplicative"
  - name: "consumption_lag_48"
    mode: "multiplicative"
  - name: "consumption_lag_720"
    mode: "multiplicative"
  # --- Weather ---
  - name: "temperature_2m"
    mode: "multiplicative"
  - name: "relative_humidity_2m"
    mode: "additive"
  - name: "wind_speed_10m"
    mode: "additive"
  - name: "shortwave_radiation"
    mode: "multiplicative"
  - name: "wth_cdd"
    mode: "multiplicative"
  - name: "wth_hdd"
    mode: "multiplicative"
  # --- Deterministic (calendar/solar) ---
  - name: "is_weekend"
    mode: "multiplicative"
  - name: "is_holiday"
    mode: "multiplicative"
  - name: "is_business_hours"
    mode: "multiplicative"
  - name: "is_peak"
    mode: "multiplicative"
  - name: "sol_elevation"
    mode: "multiplicative"

changepoint:
  prior_scale: 0.05
  n_changepoints: 25

uncertainty:
  interval_width: 0.95
  mcmc_samples: 0

optimization:
  random_seed: 42  # Optuna TPESampler seed
