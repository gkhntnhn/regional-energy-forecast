# OpenMeteo API configuration
api:
  base_url_historical: "https://archive-api.open-meteo.com/v1/archive"
  base_url_forecast: "https://api.open-meteo.com/v1/forecast"
  timeout: 30
  retry_attempts: 3

variables:
  - temperature_2m
  - relative_humidity_2m
  - dew_point_2m
  - apparent_temperature
  - precipitation
  - snow_depth
  - weather_code
  - surface_pressure
  - wind_speed_10m
  - wind_direction_10m
  - shortwave_radiation

cache:
  backend: "sqlite"
  path: "data/external/weather_cache.db"
  ttl_hours: 6
