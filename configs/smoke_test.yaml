# Smoke test configuration - minimal parameters for quick E2E validation
# Usage: make smoke-test OR python scripts/smoke_test.py --config configs/smoke_test.yaml
#
# This config overrides hyperparameters.yaml values for faster execution.
# All other configs (settings.yaml, pipeline.yaml, etc.) use their defaults.

# Data source
data:
  excel_path: "data/raw/Consumption_Input_Format.xlsx"

# Minimal CatBoost - fixed values, no search
catboost:
  n_trials: 1
  search_space:
    iterations:
      type: int
      low: 2000
      high: 2000
    learning_rate:
      type: float
      low: 0.03
      high: 0.03
      log: true           # Log-uniform: düşük lr'ler daha sık denensin
    depth:
      type: int
      low: 6
      high: 6
    l2_leaf_reg:
      type: float
      low: 1.0
      high: 1.0
    min_child_samples:
      type: int
      low: 10
      high: 10
    subsample:
      type: float
      low: 1.0
      high: 1.0
    loss_function:
      type: categorical
      choices: ["MAE"]
    random_strength:       # Zaman serisi için önemli — split randomness
      type: float
      low: 0.5
      high: 0.5
    bagging_temperature:   # Bayesian bootstrap — temporal variance'a karşı
      type: float
      low: 1.0
      high: 1.0
    grow_policy:           # SymmetricTree vs Depthwise vs Lossguide
      type: categorical
      choices: ["SymmetricTree"]


# Prophet - single trial for smoke test (production uses 5+)
prophet:
  n_trials: 1  # Prophet is fast enough for more trials, but 1 suffices for smoke test
  search_space:
    changepoint_prior_scale:
      type: float
      low: 0.5
      high: 0.5
      log: true
    seasonality_prior_scale:
      type: float
      low: 10.0
      high: 10.0
      log: true
    holidays_prior_scale:
      type: float
      low: 10.0
      high: 10.0
      log: true

# Minimal TFT - very small network, few epochs
tft:
  n_trials: 1
  training:
    max_epochs: 5          # production 100 → smoke 5
    early_stop_patience: 1
    gradient_clip_val: 0.1
    accelerator: "auto"
    enable_progress_bar: false
    enable_model_summary: false
  optimization:
    fast_epochs: 5         # production 10 → smoke 5 (Optuna trial epochs)
  search_space:
    hidden_size:
      type: int
      low: 8               # 16 → 8
      high: 8
    attention_head_size:
      type: categorical
      choices: [1]
    dropout:
      type: float
      low: 0.1
      high: 0.1
    hidden_continuous_size:
      type: int
      low: 4               # 8 → 4
      high: 4
    lstm_layers:
      type: categorical
      choices: [1]
    learning_rate:
      type: float
      low: 0.05
      high: 0.05
    batch_size:
      type: categorical
      choices: [128]        # 64 → 256 (daha az step)

# Skip redundant post-Optuna validation (trial already validates)
validation:
  skip_after_optuna: true

# Cross validation
cross_validation:
  n_splits: 12
  val_months: 1
  test_months: 1
  gap_hours: 0
  shuffle: false

# Ensemble - use all 3 models
ensemble:
  active_models:
    - catboost
    - prophet
    - tft
