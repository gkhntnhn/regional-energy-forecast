# Smoke test configuration - minimal parameters for quick E2E validation
# Usage: make smoke-test OR python scripts/smoke_test.py --config configs/smoke_test.yaml
#
# This config overrides hyperparameters.yaml values for faster execution.
# All other configs (settings.yaml, pipeline.yaml, etc.) use their defaults.

# Data source
data:
  excel_path: "data/raw/Consumption_Input_Format.xlsx"

# Minimal CatBoost - fixed values, no search
catboost:
  n_trials: 1
  search_space:
    iterations:
      type: int
      low: 500
      high: 500
    learning_rate:
      type: float
      low: 0.05
      high: 0.05
    depth:
      type: int
      low: 6
      high: 6
    l2_leaf_reg:
      type: float
      low: 3.0
      high: 3.0
    min_child_samples:
      type: int
      low: 10
      high: 10
    subsample:
      type: float
      low: 1.0
      high: 1.0
    loss_function:
      type: categorical
      choices: ["RMSE"]

# Minimal Prophet - fixed values
prophet:
  n_trials: 1
  search_space:
    changepoint_prior_scale:
      type: float
      low: 0.05
      high: 0.05
    seasonality_prior_scale:
      type: float
      low: 1.0
      high: 1.0
    holidays_prior_scale:
      type: float
      low: 1.0
      high: 1.0
    seasonality_mode:
      type: categorical
      choices: ["additive"]

# Minimal TFT - very small network, few epochs
tft:
  n_trials: 1
  training:
    max_epochs: 2          # 3 → 1
    early_stop_patience: 1
    gradient_clip_val: 0.1
    accelerator: "auto"
    enable_progress_bar: false
    enable_model_summary: false
  search_space:
    hidden_size:
      type: int
      low: 8               # 16 → 8
      high: 8
    attention_head_size:
      type: categorical
      choices: [1]
    dropout:
      type: float
      low: 0.1
      high: 0.1
    hidden_continuous_size:
      type: int
      low: 4               # 8 → 4
      high: 4
    lstm_layers:
      type: categorical
      choices: [1]
    learning_rate:
      type: float
      low: 0.01
      high: 0.01
    batch_size:
      type: categorical
      choices: [256]        # 64 → 256 (daha az step)

# Skip redundant post-Optuna validation (trial already validates)
validation:
  skip_after_optuna: true

# Cross validation
cross_validation:
  n_splits: 2
  val_months: 1
  test_months: 1
  gap_hours: 0
  shuffle: false

# Ensemble - use all 3 models
ensemble:
  active_models:
    - catboost
    - prophet
    - tft
